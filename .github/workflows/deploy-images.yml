name: Deploy Images to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      user_service: ${{ steps.filter.outputs.user_service }}
      vehicle_service: ${{ steps.filter.outputs.vehicle_service }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            user_service:
              - 'apps/user-service/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
              - 'turbo.json'
              - '.dockerignore'
            vehicle_service:
              - 'apps/vehicle-service/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
              - 'turbo.json'
              - '.dockerignore'

  push-user-service:
    needs: changes
    if: needs.changes.outputs.user_service == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push user-service image
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ vars.ECR_USER_SERVICE_REPOSITORY }}"

          docker build \
            -f apps/user-service/Dockerfile \
            -t "${IMAGE_URI}:latest" \
            -t "${IMAGE_URI}:${{ github.sha }}" \
            .

          docker push "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:${{ github.sha }}"

  push-vehicle-service:
    needs: changes
    if: needs.changes.outputs.vehicle_service == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push vehicle-service image
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ vars.ECR_VEHICLE_SERVICE_REPOSITORY }}"

          docker build \
            -f apps/vehicle-service/Dockerfile \
            -t "${IMAGE_URI}:latest" \
            -t "${IMAGE_URI}:${{ github.sha }}" \
            .

          docker push "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:${{ github.sha }}"
