services:
  frontend:
    image: ${REGISTRY}/frontend:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      user-service:
        condition: service_started
      vehicle-service:
        condition: service_started

  user-service:
    image: ${REGISTRY}/user-service:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: ${USER_SERVICE_DATABASE_URL}
      NODE_ENV: production
      PORT: 4200
    ports:
      - "4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  vehicle-service:
    image: ${REGISTRY}/vehicle-service:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: ${VEHICLE_SERVICE_DATABASE_URL}
      NODE_ENV: production
      PORT: 4203
    ports:
      - "4203:4203"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
